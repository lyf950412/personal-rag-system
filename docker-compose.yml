version: '3.8'

services:
  # 后端服务
  rag-backend:
    build:
      context: ./rag-backend
      dockerfile: Dockerfile
    container_name: rag-backend
    environment:
      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-rag_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # AI配置
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      VOLCENGINE_API_KEY: ${VOLCENGINE_API_KEY:-}
      VOLCENGINE_BASE_URL: ${VOLCENGINE_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-doubao-embedding-vision-250615}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      # JWT配置
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # CORS配置
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      # Spring Profile
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8022:8080"
    volumes:
      - backend_logs:/var/log/rag-backend
      - ./rag-backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rag-network

  # 前端服务
  rag-frontend:
    build:
      context: ./rag-frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "8021:80"
    depends_on:
      - rag-backend
    networks:
      - rag-network

networks:
  rag-network:
    name: rag-network

volumes:
  postgres_data:
    name: rag-postgres-data
  backend_logs:
    name: rag-backend-logs
